apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-event-collector
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: "https://github.com/hyeon-wooo/kube-event-collector.git"
      path: "charts/kube-event-collector"
      targetRevision: "main"
      helm:
        valueFiles:
          - $myconfig/values.yaml
    - repoURL: "git@my-gitops-repo.git"
      targetRevision: HEAD
      ref: myconfig
  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
