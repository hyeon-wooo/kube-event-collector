name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  # 수동 실행 허용
  workflow_dispatch:

env:
  # Docker Hub 저장소 이름 (USERNAME/REPOSITORY 형식)
  IMAGE_NAME: bvv8808/kube-event-collector

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Read Version from Chart.yaml
        id: get_version
        run: |
          VERSION=$(grep '^appVersion:' charts/kube-event-collector/Chart.yaml | awk '{print $2}' | tr -d '"')
          CHART_VERSION=$(grep '^version:' charts/kube-event-collector/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "Building image version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "CHART_VERSION=$CHART_VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: bvv8808
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.get_version.outputs.VERSION }}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # 배포 성공 시 알림 (Slack Webhook)
      - name: Notify Slack on Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"✅ *kube-event-collector* 배포 성공\n- Chart Version: \`${{ steps.get_version.outputs.CHART_VERSION }}\`\n- App Version: \`${{ steps.get_version.outputs.VERSION }}\`\n- SHA: \`${{ github.sha }}\`\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # 배포 실패 시 알림 (Slack Webhook)
      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"❌ *kube-event-collector* 배포 실패\n- 버전: \`${{ steps.get_version.outputs.VERSION }}\`\n- 액션 링크: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  release-charts:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Create gh-pages branch if not exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages branch does not exist. Creating..."
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initial gh-pages commit"
            git push origin gh-pages
            git checkout main
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
