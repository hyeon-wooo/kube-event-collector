name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  # мҲҳлҸҷ мӢӨн–ү н—Ҳмҡ©
  workflow_dispatch:

env:
  # Docker Hub м ҖмһҘмҶҢ мқҙлҰ„ (USERNAME/REPOSITORY нҳ•мӢқ)
  IMAGE_NAME: bvv8808/kube-event-collector

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Read Version from Chart.yaml
        id: get_version
        run: |
          VERSION=$(grep '^appVersion:' charts/kube-event-collector/Chart.yaml | awk '{print $2}' | tr -d '"')
          CHART_VERSION=$(grep '^version:' charts/kube-event-collector/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "Building image version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "CHART_VERSION=$CHART_VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: bvv8808
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.get_version.outputs.VERSION }}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # л°°нҸ¬ м„ұкіө мӢң м•ҢлҰј (Slack Webhook)
      - name: Notify Slack on Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"вң… *kube-event-collector* л°°нҸ¬ м„ұкіө\n- Chart Version: \`${{ steps.get_version.outputs.CHART_VERSION }}\`\n- App Version: \`${{ steps.get_version.outputs.VERSION }}\`\n- SHA: \`${{ github.sha }}\`\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # л°°нҸ¬ мӢӨнҢЁ мӢң м•ҢлҰј (Slack Webhook)
      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"вқҢ *kube-event-collector* л°°нҸ¬ мӢӨнҢЁ\n- лІ„м „: \`${{ steps.get_version.outputs.VERSION }}\`\n- м•Ўм…ҳ л§ҒнҒ¬: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
